name: 3. Chaos Suite

on:
  pull_request:
  workflow_dispatch:

# Cancel any in-progress run for the same PR / branch so fast-push cycles
# don't queue up duplicate jobs.
concurrency:
  group: chaos-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  chaos:
    name: Trial by Fire — Chaos Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run test:install

      - name: Run Chaos Suite
        run: bun run test:chaos
        env:
          CI: true
          # Clerk — needed so Next.js dev server starts without crashing
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          # Cloudflare — wrangler dev runs locally but reads account from env
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
